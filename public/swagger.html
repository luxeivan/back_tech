<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>МКиМО — Документация API</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@4.18.3/swagger-ui.css">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; }
    .topbar { display: none !important; }
    .info .title { font-size: 1.6em !important; }
    .opblock-summary-description { color: #666 !important; }

    /* Скрываем оригинальный текст и вставляем русский через CSS */
    .btn authorize::after { content: "Авторизация" !important; }
    .btn authorize ~ span::after { content: "" !important; }
    .btn .authorize__btn_auth::after { content: "Авторизация" !important; }
    .btn .authorize__btn_logout::after { content: "Выход" !important; }
  </style>
</head>
<body>
  <div id="swagger-ui"></div>

  <script src="https://unpkg.com/swagger-ui-dist@4.18.3/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist@4.18.3/swagger-ui-standalone-preset.js"></script>
  <script>
    window.onload = function () {
      const ui = SwaggerUIBundle({
        url: '/api-docs.json',
        dom_id: '#swagger-ui',
        deepLinking: true,
        filter: true,
        docExpansion: 'list',
        displayRequestDuration: true,
        tryItOutEnabled: false,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        layout: 'StandaloneLayout',
        onComplete: function () {
          setTimeout(translateUI, 500);
        }
      });

      var TRANSLATIONS = {
        'Explore': 'Просмотр',
        'Authorize': 'Авторизация',
        'Logout': 'Выход',
        'Close': 'Закрыть',
        'Call': 'Вызов',
        'Clear': 'Очистить',
        'Cancel': 'Отмена',
        'Execute': 'Выполнить',
        'Try it out': 'Попробовать',
        'Server response': 'Ответ сервера',
        'Response body': 'Тело ответа',
        'Response headers': 'Заголовки ответа',
        'Response code': 'Код ответа',
        'Parameters': 'Параметры',
        'Responses': 'Ответы',
        'Request body': 'Тело запроса',
        'Request URL': 'URL запроса',
        'Hide': 'Скрыть',
        'Show': 'Показать',
        'Schema': 'Схема',
        'Example Value': 'Пример значения',
        'Model': 'Модель',
        'Download': 'Скачать',
        'Username': 'Логин',
        'Password': 'Пароль',
        'Apply': 'Применить'
      };

      var TABLE_HEADERS = {
        'Name': 'Имя',
        'In': 'В',
        'Description': 'Описание',
        'Required': 'Обязательно',
        'Schema': 'Схема',
        'Value': 'Значение',
        'Status': 'Статус',
        'Links': 'Ссылки'
      };

      function translateText(el) {
        var text = el.textContent.trim();
        if (TRANSLATIONS[text]) {
          el.textContent = TRANSLATIONS[text];
        }
      }

      function translateUI() {
        document.querySelectorAll(
          '.btn, .opblock-summary-control, .tab-item, .model-title, ' +
          '.btn-cancel, .btn.execute, [data-dismiss], ' +
          '.response-control-media-type__accept-message, .servers-title, ' +
          '.servers > label'
        ).forEach(translateText);

        document.querySelectorAll('.parameter__name, .parameters__name, th').forEach(function (el) {
          var t = el.textContent.trim();
          if (TABLE_HEADERS[t]) el.textContent = TABLE_HEADERS[t];
        });

        document.querySelectorAll('.dialog-ux .modal-ux .dialog-header h3').forEach(function (el) {
          if (el.textContent.trim() === 'Available authorizations')
            el.textContent = 'Доступные авторизации';
        });
      }

      var debounceTimer = null;
      var observer = new MutationObserver(function () {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(translateUI, 300);
      });

      observer.observe(document.getElementById('swagger-ui'), {
        childList: true,
        subtree: true
      });
    };
  </script>
</body>
</html>
